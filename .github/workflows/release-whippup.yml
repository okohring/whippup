name: Release Stagecard

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release, for example 1.15.149'
        required: true
        type: string
      release_notes:
        description: 'Release notes / changelog shown in WordPress plugin details'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Stamp plugin version for release
        shell: bash
        run: |
          VERSION='${{ inputs.version }}'
          perl -0pi -e "s/Version:\s*[0-9]+\.[0-9]+\.[0-9]+/Version: ${VERSION}/" program-agenda/program-agenda.php
          perl -0pi -e "s/const VERSION = '[0-9]+\.[0-9]+\.[0-9]+';/const VERSION = '${VERSION}';/" program-agenda/program-agenda.php
          grep -m1 "Version:" program-agenda/program-agenda.php
          grep -m1 "const VERSION" program-agenda/program-agenda.php

      - name: Build plugin ZIP
        shell: bash
        run: |
          VERSION='${{ inputs.version }}'
          SAFE_VERSION=${VERSION//./-}
          ZIP_NAME="program-agenda-v${SAFE_VERSION}.zip"
          zip -r "$ZIP_NAME" program-agenda \
            -x "*.DS_Store" \
            -x "*/.git/*" \
            -x "*/node_modules/*"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create release notes file
        shell: bash
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > release-notes.md
          else
            printf 'Stagecard %s\n' '${{ inputs.version }}' > release-notes.md
          fi

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION='${{ inputs.version }}'
          TAG="v${VERSION}"
          gh release create "$TAG" "$ZIP_NAME" \
            --title "Stagecard ${VERSION}" \
            --notes-file release-notes.md \
            --latest
