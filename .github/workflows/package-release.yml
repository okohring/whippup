name: Package Whippup release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 "Version:" program-agenda/program-agenda.php | sed 's/.*Version:[[:space:]]*//')
          SAFE_VERSION=${VERSION//./-}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        shell: bash
        run: |
          zip -r "program-agenda-v${{ steps.version.outputs.safe_version }}.zip" program-agenda \
            -x "*.DS_Store" \
            -x "*/.git/*" \
            -x "*/node_modules/*"

      - name: Attach ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: program-agenda-v${{ steps.version.outputs.safe_version }}.zip
