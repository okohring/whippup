name: Finalize Stagecard hover sponsor and preview styling

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run hover sponsor and preview polish scripts
        run: |
          python3 .github/scripts/stagecard-hover-sponsor-polish.py
          python3 .github/scripts/stagecard-final-hover-lock.py
          python3 .github/scripts/stagecard-preview-polish.py

      - name: Commit final polish
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No final polish changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css program-agenda/assets/css/admin.css program-agenda/assets/js/admin.js
          git commit -m "Finalize hover sponsor and preview styling"
          git push
