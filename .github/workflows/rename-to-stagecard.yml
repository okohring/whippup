name: Remove Stagecard event card hover animations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Remove event card animation options and add simple hover scale
        shell: bash
        run: |
          set -e
          python3 <<'PY'
          from pathlib import Path
          import re

          php_path = Path('program-agenda/program-agenda.php')
          css_path = Path('program-agenda/assets/css/public.css')

          php = php_path.read_text()

          # Remove hover animation state from the Program customization UI.
          php = php.replace("        $hover_animation = in_array(($s['hover_animation'] ?? 'default'), ['default','slant'], true) ? ($s['hover_animation'] ?? 'default') : 'default';\n", "")
          php = php.replace('Display options, tabs, date format, and hover behavior', 'Display options, tabs, date format, and card size')
          php = re.sub(r"\n\s*echo '<label class=\"pa-field\">Hover animation <select class=\"pa-agenda-live-field\" name=\"agenda\[hover_animation\]\">.*?</label>';", "", php)

          # Stop saving hover animation settings going forward.
          php = re.sub(r"\n\s*'hover_animation' => in_array\(sanitize_key\(\$agenda_in\['hover_animation'\] \?\? 'default'\), \['default','slant'\], true\) \? sanitize_key\(\$agenda_in\['hover_animation'\] \?\? 'default'\) : 'default',", "", php)

          # Stop reading hover animation settings and remove the hover class from event cards.
          php = php.replace("        $hover_animation = in_array(($agenda['hover_animation'] ?? 'default'), ['default','slant'], true) ? ($agenda['hover_animation'] ?? 'default') : 'default';\n", "")
          php = php.replace("            'pa-event-card--hover-' . $hover_animation,\n", "")

          # Remove hover class from admin preview markup.
          php = php.replace(' pa-event-card--hover-default', '')
          php = php.replace(' pa-event-card--hover-slant', '')

          php_path.write_text(php)

          css = css_path.read_text()
          marker = '/* v1.15.157: remove event card hover animations; use stable whole-card hover scale */'
          addition_lines = [
              '',
              '/* v1.15.157: remove event card hover animations; use stable whole-card hover scale */',
              '.pa-event-card,.pa-agenda-item{transition:transform .16s ease, box-shadow .16s ease!important;transform-origin:center center;}',
              '.pa-event-card:hover,.pa-event-card:focus-within,.pa-agenda-item:hover,.pa-agenda-item:focus-within{transform:scale(1.015)!important;}',
              '.pa-event-card--hover-default,.pa-event-card--hover-slant{transform:none;}',
              '.pa-event-card__datebar,.pa-agenda-category-bar{transition:none!important;transform:none!important;}',
              '.pa-event-card__datebar::before,.pa-agenda-category-bar::before{transform:none!important;transition:none!important;display:none!important;}',
              '.pa-event-card:hover .pa-event-card__datebar,.pa-event-card:focus-within .pa-event-card__datebar,.pa-agenda-item:hover .pa-agenda-category-bar,.pa-agenda-item:focus-within .pa-agenda-category-bar{width:inherit!important;transform:none!important;}',
              '.pa-schedule .pa-agenda-category-bar,.pa-single .pa-agenda-category-bar{width:68px!important;flex:0 0 68px!important;}',
              '@media(max-width:700px){.pa-event-card:hover,.pa-event-card:focus-within,.pa-agenda-item:hover,.pa-agenda-item:focus-within{transform:none!important;}.pa-schedule .pa-agenda-category-bar,.pa-single .pa-agenda-category-bar,.pa-agenda-item:hover .pa-agenda-category-bar,.pa-agenda-item:focus-within .pa-agenda-category-bar{width:100%!important;flex-basis:auto!important;}}',
              '',
          ]
          if marker not in css:
              css_path.write_text(css.rstrip() + '\n'.join(addition_lines))
          PY

      - name: Commit hover cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No hover cleanup changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css
          git commit -m "Remove event card hover animations"
          git push
