name: Apply Stagecard layout and URL polish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Apply event title, sponsor position, and slug changes
        shell: bash
        run: |
          set -e
          python3 <<'PY'
          from pathlib import Path
          import re

          php_path = Path('program-agenda/program-agenda.php')
          css_path = Path('program-agenda/assets/css/public.css')

          php = php_path.read_text()
          original_php = php

          php = php.replace("'rewrite' => ['slug' => 'program-event'],", "'rewrite' => ['slug' => 'program-event', 'with_front' => false],")
          php = php.replace("'rewrite' => ['slug' => 'program-speaker'],", "'rewrite' => ['slug' => 'program-speaker', 'with_front' => false],")
          php = php.replace("'rewrite' => ['slug' => 'program-sponsor'],", "'rewrite' => ['slug' => 'program-sponsor', 'with_front' => false],")
          php = php.replace("'rewrite' => ['slug' => 'program-event', 'with_front' => false, 'with_front' => false],", "'rewrite' => ['slug' => 'program-event', 'with_front' => false],")
          php = php.replace("'rewrite' => ['slug' => 'program-speaker', 'with_front' => false, 'with_front' => false],", "'rewrite' => ['slug' => 'program-speaker', 'with_front' => false],")
          php = php.replace("'rewrite' => ['slug' => 'program-sponsor', 'with_front' => false, 'with_front' => false],", "'rewrite' => ['slug' => 'program-sponsor', 'with_front' => false],")

          php = re.sub(
              r'<h3 class="pa-event-card__title">(.*?)</h3>',
              r'<h4 class="pa-event-card__title">\1</h4>',
              php,
              flags=re.S
          )

          sponsor_pattern = re.compile(
              r"(?P<open>\s*echo '<div class=\"pa-single-content ' \.[\s\S]*?wp_kses_post\(wpautop\(\$post->post_content\)\) \. '</div>';\n)"
              r"(?P<sponsors>\s*\$sponsor_ids = get_post_meta\(\$post->ID, '_pa_sponsor_ids', true\);[\s\S]*?echo '</div></div>';\n\s*}\n)"
              r"(?P<speakers>\s*\$speaker_ids = get_post_meta\(\$post->ID, '_pa_speaker_ids', true\);[\s\S]*?echo '<div class=\"pa-event-single-speakers\"><h4>Speakers</h4>' \. \$this->speaker_cards\(\$speaker_ids, \$program_id, 'agenda'\) \. '</div>';\n\s*}\n)"
              r"\s*echo '</div></article>'; return ob_get_clean\(\);"
          )

          if 'pa-event-sponsor-logos-below' not in php:
              match = sponsor_pattern.search(php)
              if not match:
                  raise SystemExit('Could not find expected event page sponsor/speaker block.')

              sponsors = match.group('sponsors').replace(
                  'pa-event-sponsor-logos"><h4>Sponsored by</h4>',
                  'pa-event-sponsor-logos pa-event-sponsor-logos-below"><h4>Sponsored by</h4>'
              )
              replacement = (
                  match.group('open') +
                  match.group('speakers') +
                  "        echo '</div>';\n" +
                  sponsors +
                  "        echo '</article>'; return ob_get_clean();"
              )
              php = php[:match.start()] + replacement + php[match.end():]

          if php == original_php:
              raise SystemExit('No PHP changes were applied. The current file may already include these changes.')
          php_path.write_text(php)

          css = css_path.read_text()
          marker = '/* Stagecard layout and URL polish */'
          addition = "\n\n".join([])
          addition = "\n".join([
              "",
              "/* Stagecard layout and URL polish */",
              ".pa-event-card .pa-event-card__title,",
              ".pa-event-card .pa-event-card__title a{",
              "  margin:0!important;",
              "  font-size:1rem!important;",
              "  line-height:1.15!important;",
              "  font-weight:600!important;",
              "  letter-spacing:normal!important;",
              "  text-transform:none!important;",
              "}",
              ".pa-event-sponsor-logos-below{",
              "  padding:32px 50px 50px;",
              "  margin:0;",
              "}",
              ".pa-event-sponsor-logos-below h4{",
              "  margin-top:0;",
              "}",
              "@media(max-width:700px){",
              "  .pa-event-sponsor-logos-below{",
              "    padding:24px 30px 30px;",
              "  }",
              "}",
              "",
          ])
          if marker not in css:
              css_path.write_text(css.rstrip() + addition)
          PY

      - name: Commit polish changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No layout or URL polish changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css
          git commit -m "Polish event titles sponsors and slugs"
          git push
