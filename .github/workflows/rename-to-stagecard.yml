name: Clean up Stagecard CSS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run full CSS cleanup
        run: |
          python3 .github/scripts/stagecard-full-css-cleanup.py
          python3 .github/scripts/stagecard-admin-preview-css-cleanup.py
          python3 .github/scripts/stagecard-fix-event-hover-media.py
          python3 .github/scripts/stagecard-sponsor-form-ui-cleanup.py
          python3 .github/scripts/stagecard-speaker-event-picker.py
          python3 .github/scripts/stagecard-event-page-speaker-size.py
          python3 .github/scripts/stagecard-montserrat-font.py
          python3 .github/scripts/stagecard-program-pdf-shortcode.py

      - name: Commit CSS cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No CSS cleanup changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css program-agenda/assets/css/admin.css program-agenda/assets/js/admin.js
          git commit -m "Clean up Stagecard CSS"
          git push
