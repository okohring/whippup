name: Clean up Stagecard CSS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run full CSS cleanup
        run: |
          python3 .github/scripts/stagecard-full-css-cleanup.py
          python3 .github/scripts/stagecard-admin-preview-css-cleanup.py
          python3 .github/scripts/stagecard-fix-event-hover-media.py
          python3 .github/scripts/stagecard-sponsor-form-ui-cleanup.py
          python3 .github/scripts/stagecard-speaker-event-picker.py
          python3 .github/scripts/stagecard-event-page-speaker-size.py
          python3 .github/scripts/stagecard-montserrat-font.py
          python3 .github/scripts/stagecard-invite-datebar-eventpage-grid.py
          python3 .github/scripts/stagecard-program-speakers-shortcode.py
          python3 .github/scripts/stagecard-program-pdf-shortcode.py

      - name: Validate generated files
        shell: bash
        run: |
          php -l program-agenda/program-agenda.php
          python3 - <<'PY'
          from pathlib import Path
          for path in ['program-agenda/assets/css/public.css', 'program-agenda/assets/css/admin.css']:
              text = Path(path).read_text()
              balance = 0
              for i, char in enumerate(text):
                  if char == '{':
                      balance += 1
                  elif char == '}':
                      balance -= 1
                  if balance < 0:
                      raise SystemExit(f'{path}: CSS brace balance went negative near character {i}.')
              if balance != 0:
                  raise SystemExit(f'{path}: CSS brace balance is {balance}, expected 0.')
          print('PHP syntax and CSS brace checks passed.')
          PY

      - name: Commit CSS cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No CSS cleanup changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css program-agenda/assets/css/admin.css program-agenda/assets/js/admin.js
          git commit -m "Clean up Stagecard CSS"
          git push
