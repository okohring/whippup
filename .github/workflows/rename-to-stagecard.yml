name: Finalize Stagecard hover and sponsor styling

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run hover and sponsor polish scripts
        run: |
          python3 .github/scripts/stagecard-hover-sponsor-polish.py
          python3 .github/scripts/stagecard-final-hover-lock.py

      - name: Commit final hover and sponsor polish
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No final hover/sponsor changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add program-agenda/program-agenda.php program-agenda/assets/css/public.css
          git commit -m "Finalize hover lock and sponsor styling"
          git push
