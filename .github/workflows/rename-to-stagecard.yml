name: Rename Whippup to Stagecard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Rename files and text
        shell: bash
        run: |
          set -e

          if [ -f program-agenda/assets/img/whippup-logo.svg ]; then
            mv -f program-agenda/assets/img/whippup-logo.svg program-agenda/assets/img/stagecard-logo.svg
          fi

          # Replace only tracked text files outside .github. GitHub blocks Actions from
          # modifying workflow files unless the token has separate workflow permission.
          git grep -Il 'Whippup\|whippup\|WHIPPUP' -- . ':!:.github/*' | while IFS= read -r file; do
            perl -pi -e 's/Whippup/Stagecard/g; s/whippup/stagecard/g; s/WHIPPUP/STAGECARD/g;' "$file"
          done

          echo "Remaining old brand references outside .github, if any:"
          git grep -n 'Whippup\|whippup\|WHIPPUP' -- . ':!:.github/*' || true

      - name: Commit rename
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No Stagecard rename changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename Whippup to Stagecard"
          git push
